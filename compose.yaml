services:
  server:
    build:
      context: .
    ports:
      - 8000:80
    environment:
      APP_ENV: local
      APP_KEY: base64:ce3GPY7aHE2oK7SaDEd5b1xM9TRl6wclP+sNExOWLXc=
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: apotek_db
      DB_USERNAME: root
      DB_PASSWORD: ""
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: apotek_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - 3307:3306
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
